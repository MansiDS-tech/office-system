<!DOCTYPE html>
<html>
<head>
    <title>Monthly Report</title>
</head>
<body>

<h1>📊 Monthly Report</h1>

<h3>Attendance:</h3>
<ul>
    {% for row in attendance %}
        <li>{{ row[0] }} : {{ row[1] }}</li>
    {% endfor %}
</ul>

<h3>Tasks:</h3>
<ul>
    {% for row in tasks %}
        <li>{{ row[0] }} : {{ row[1] }}</li>
    {% endfor %}
</ul>

<br>
<a href="/">Back to Dashboard</a>

</body>
</html>
